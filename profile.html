<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5f2a">
    <title>Profile - Kasuwa Dan Goronyo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <button class="icon-btn back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="logo">
                    <span>My Profile</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="saveProfile()">
                        <i class="fas fa-save"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Profile Header -->
            <section class="profile-header-section">
                <div class="profile-avatar-large" onclick="changeAvatar()">
                    <i class="fas fa-user"></i>
                    <div class="avatar-overlay">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <h2 id="profileName">Mallam Abdullahi</h2>
                <p id="profileRole">Store Owner</p>
            </section>

            <!-- Profile Form -->
            <section class="profile-form-section">
                <form id="profileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" placeholder="Your full name">
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="editEmail" placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="editPhone" placeholder="08012345678">
                    </div>
                    
                    <div class="form-group">
                        <label>Store Name</label>
                        <input type="text" id="editStoreName" placeholder="Your store name">
                    </div>
                    
                    <div class="form-group">
                        <label>Store Address</label>
                        <textarea id="editStoreAddress" rows="3" placeholder="Store location"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Currency</label>
                        <select id="editCurrency">
                            <option value="₦">Naira (₦)</option>
                            <option value="$">Dollar ($)</option>
                            <option value="€">Euro (€)</option>
                            <option value="£">Pound (£)</option>
                        </select>
                    </div>
                </form>
            </section>

            <!-- Account Stats -->
            <section class="account-stats">
                <h3>Account Statistics</h3>
                <div class="stats-grid-mini">
                    <div class="stat-item">
                        <span class="stat-value" id="statMemberSince">--</span>
                        <span class="stat-label">Member Since</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statTotalSales">0</span>
                        <span class="stat-label">Total Sales</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statProducts">0</span>
                        <span class="stat-label">Products</span>
                    </div>
                </div>
            </section>

            <!-- Actions -->
            <section class="profile-actions">
                <button class="action-btn" onclick="changePassword()">
                    <i class="fas fa-lock"></i>
                    <span>Change Password</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
                
                <button class="action-btn" onclick="manageSubscription()">
                    <i class="fas fa-crown"></i>
                    <span>Subscription Plan</span>
                    <span class="badge-pro">FREE</span>
                </button>
                
                <button class="action-btn" onclick="exportData()">
                    <i class="fas fa-download"></i>
                    <span>Export All Data</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
                
                <button class="action-btn danger" onclick="deleteAccount()">
                    <i class="fas fa-trash-alt"></i>
                    <span>Delete Account</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </section>
        </main>

        <!-- Change Password Modal -->
        <div class="modal" id="passwordModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Change Password</h3>
                    <button class="close-btn" onclick="closePasswordModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="passwordForm" onsubmit="updatePassword(event)">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Update Password</button>
                </form>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="stock.html" class="nav-link">
                <i class="fas fa-boxes"></i>
                <span>Stock</span>
            </a>
            <a href="sale.html" class="nav-link sale-link">
                <div class="sale-circle">
                    <i class="fas fa-plus"></i>
                </div>
                <span>Sale</span>
            </a>
            <a href="history.html" class="nav-link">
                <i class="fas fa-history"></i>
                <span>History</span>
            </a>
            <a href="settings.html" class="nav-link">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        let currentUser = {};

        document.addEventListener('DOMContentLoaded', function() {
            loadProfile();
            loadStats();
        });

        function loadProfile() {
            currentUser = JSON.parse(localStorage.getItem('user')) || {
                name: 'Mallam Abdullahi',
                email: '',
                phone: '',
                storeName: 'Kasuwa Dan Goronyo',
                storeAddress: '',
                currency: '₦',
                role: 'Store Owner',
                createdAt: new Date().toISOString()
            };

            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileRole').textContent = currentUser.role;
            document.getElementById('editName').value = currentUser.name || '';
            document.getElementById('editEmail').value = currentUser.email || '';
            document.getElementById('editPhone').value = currentUser.phone || '';
            document.getElementById('editStoreName').value = currentUser.storeName || '';
            document.getElementById('editStoreAddress').value = currentUser.storeAddress || '';
            document.getElementById('editCurrency').value = currentUser.currency || '₦';
        }

        function loadStats() {
            const sales = JSON.parse(localStorage.getItem('sales')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];
            
            document.getElementById('statMemberSince').textContent = 
                currentUser.createdAt ? new Date(currentUser.createdAt).toLocaleDateString() : '--';
            document.getElementById('statTotalSales').textContent = sales.length;
            document.getElementById('statProducts').textContent = products.length;
        }

        function saveProfile() {
            currentUser = {
                ...currentUser,
                name: document.getElementById('editName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                storeName: document.getElementById('editStoreName').value,
                storeAddress: document.getElementById('editStoreAddress').value,
                currency: document.getElementById('editCurrency').value,
                updatedAt: new Date().toISOString()
            };

            localStorage.setItem('user', JSON.stringify(currentUser));
            loadProfile();
            showNotification('Profile saved successfully!', 'success');
        }

        function changeAvatar() {
            showNotification('Avatar upload coming soon!', 'info');
        }

        function changePassword() {
            document.getElementById('passwordModal').classList.add('active');
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
            document.getElementById('passwordForm').reset();
        }

        function updatePassword(e) {
            e.preventDefault();
            
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            // Simple validation (in real app, verify against stored password)
            if (newPass !== confirm) {
                showNotification('Passwords do not match!', 'error');
                return;
            }

            showNotification('Password updated successfully!', 'success');
            closePasswordModal();
        }

        function manageSubscription() {
            showNotification('Upgrade to Pro for premium features!', 'info');
        }

        function exportData() {
            const data = {
                user: currentUser,
                products: JSON.parse(localStorage.getItem('products')) || [],
                sales: JSON.parse(localStorage.getItem('sales')) || [],
                customers: JSON.parse(localStorage.getItem('customers')) || [],
                categories: JSON.parse(localStorage.getItem('categories')) || [],
                exportedAt: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kasuwa_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            
            showNotification('Data exported successfully!', 'success');
        }

        function deleteAccount() {
            if (confirm('WARNING: This will delete all your data permanently. Are you sure?')) {
                if (prompt('Type DELETE to confirm:') === 'DELETE') {
                    localStorage.clear();
                    showNotification('Account deleted. Redirecting...', 'info');
                    setTimeout(() => window.location.reload(), 2000);
                }
            }
        }
    </script>
</body>
</html>
