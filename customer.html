<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a5f2a">
    <title>Customers - Kasuwa Dan Goronyo</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <button class="icon-btn back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="logo">
                    <span>Customers</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="showAddCustomerModal()">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search -->
            <section class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchCustomers" placeholder="Search customers..." onkeyup="searchCustomers()">
                </div>
            </section>

            <!-- Stats -->
            <section class="customer-stats">
                <div class="stat-card">
                    <h4 id="totalCustomers">0</h4>
                    <p>Total Customers</p>
                </div>
                <div class="stat-card">
                    <h4 id="totalDebt">₦0.00</h4>
                    <p>Total Debt</p>
                </div>
            </section>

            <!-- Customers List -->
            <section class="customers-list-section">
                <div class="customers-list" id="customersList">
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>No customers yet</p>
                        <button class="btn-primary" onclick="showAddCustomerModal()">Add Customer</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Add Customer Modal -->
        <div class="modal" id="addCustomerModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add New Customer</h3>
                    <button class="close-btn" onclick="closeAddCustomerModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="addCustomerForm" onsubmit="saveCustomer(event)">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="customerName" required placeholder="e.g., Musa Ibrahim">
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="customerPhone" required placeholder="e.g., 08012345678">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="customerEmail" placeholder="optional@email.com">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="customerAddress" rows="2" placeholder="Customer address"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Opening Balance (Debt) - ₦</label>
                        <input type="number" id="customerDebt" min="0" step="0.01" value="0" placeholder="0.00">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeAddCustomerModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Customer</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Customer Detail Modal -->
        <div class="modal" id="customerDetailModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Customer Details</h3>
                    <button class="close-btn" onclick="closeCustomerDetailModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="customer-detail-content" id="customerDetailContent">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="stock.html" class="nav-link">
                <i class="fas fa-boxes"></i>
                <span>Stock</span>
            </a>
            <a href="sale.html" class="nav-link sale-link">
                <div class="sale-circle">
                    <i class="fas fa-plus"></i>
                </div>
                <span>Sale</span>
            </a>
            <a href="history.html" class="nav-link">
                <i class="fas fa-history"></i>
                <span>History</span>
            </a>
            <a href="settings.html" class="nav-link">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
    <script>
        let customers = [];
        let sales = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadCustomers();
            loadSales();
            updateStats();
        });

        function loadCustomers() {
            customers = JSON.parse(localStorage.getItem('customers')) || [];
            renderCustomers();
        }

        function loadSales() {
            sales = JSON.parse(localStorage.getItem('sales')) || [];
        }

        function renderCustomers() {
            const container = document.getElementById('customersList');
            const searchTerm = document.getElementById('searchCustomers').value.toLowerCase();
            
            let filtered = customers;
            if (searchTerm) {
                filtered = customers.filter(c => 
                    c.name.toLowerCase().includes(searchTerm) ||
                    c.phone.includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <p>No customers found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(customer => {
                const customerSales = sales.filter(s => s.customer === customer.name);
                const totalSpent = customerSales.reduce((sum, s) => sum + s.total, 0);
                
                return `
                    <div class="customer-card" onclick="viewCustomerDetail(${customer.id})">
                        <div class="customer-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="customer-info">
                            <h4>${escapeHtml(customer.name)}</h4>
                            <p><i class="fas fa-phone"></i> ${escapeHtml(customer.phone)}</p>
                            ${customer.debt > 0 ? `<span class="debt-badge">Debt: ₦${formatNumber(customer.debt)}</span>` : ''}
                        </div>
                        <div class="customer-stats-mini">
                            <span class="spent">₦${formatNumber(totalSpent)}</span>
                            <span class="purchases">${customerSales.length} orders</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function searchCustomers() {
            renderCustomers();
        }

        function updateStats() {
            document.getElementById('totalCustomers').textContent = customers.length;
            const totalDebt = customers.reduce((sum, c) => sum + (parseFloat(c.debt) || 0), 0);
            document.getElementById('totalDebt').textContent = '₦' + formatNumber(totalDebt);
        }

        function showAddCustomerModal() {
            document.getElementById('addCustomerModal').classList.add('active');
        }

        function closeAddCustomerModal() {
            document.getElementById('addCustomerModal').classList.remove('active');
            document.getElementById('addCustomerForm').reset();
        }

        function saveCustomer(e) {
            e.preventDefault();
            
            const customer = {
                id: Date.now(),
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                email: document.getElementById('customerEmail').value,
                address: document.getElementById('customerAddress').value,
                debt: parseFloat(document.getElementById('customerDebt').value) || 0,
                createdAt: new Date().toISOString()
            };

            customers.push(customer);
            localStorage.setItem('customers', JSON.stringify(customers));
            
            closeAddCustomerModal();
            renderCustomers();
            updateStats();
            showNotification('Customer added successfully!', 'success');
        }

        function viewCustomerDetail(id) {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;

            const customerSales = sales.filter(s => s.customer === customer.name);
            const totalSpent = customerSales.reduce((sum, s) => sum + s.total, 0);

            const content = document.getElementById('customerDetailContent');
            content.innerHTML = `
                <div class="customer-profile">
                    <div class="customer-avatar-large">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3>${escapeHtml(customer.name)}</h3>
                    <p class="customer-since">Customer since ${new Date(customer.createdAt).toLocaleDateString()}</p>
                </div>
                
                <div class="customer-details-grid">
                    <div class="detail-item">
                        <i class="fas fa-phone"></i>
                        <span>${escapeHtml(customer.phone)}</span>
                    </div>
                    ${customer.email ? `
                    <div class="detail-item">
                        <i class="fas fa-envelope"></i>
                        <span>${escapeHtml(customer.email)}</span>
                    </div>
                    ` : ''}
                    ${customer.address ? `
                    <div class="detail-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${escapeHtml(customer.address)}</span>
                    </div>
                    ` : ''}
                </div>

                <div class="customer-summary">
                    <div class="summary-card">
                        <h4>₦${formatNumber(totalSpent)}</h4>
                        <p>Total Spent</p>
                    </div>
                    <div class="summary-card">
                        <h4>${customerSales.length}</h4>
                        <p>Orders</p>
                    </div>
                    <div class="summary-card ${customer.debt > 0 ? 'debt' : ''}">
                        <h4>₦${formatNumber(customer.debt || 0)}</h4>
                        <p>Balance Due</p>
                    </div>
                </div>

                <div class="customer-actions">
                    <button class="btn-primary" onclick="recordPayment(${customer.id})">
                        <i class="fas fa-money-bill-wave"></i> Record Payment
                    </button>
                    <button class="btn-secondary" onclick="editCustomer(${customer.id})">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                </div>

                <div class="purchase-history">
                    <h4>Recent Purchases</h4>
                    ${customerSales.length === 0 ? '<p class="no-data">No purchases yet</p>' : 
                        customerSales.slice(-5).reverse().map(sale => `
                            <div class="purchase-item">
                                <div>
                                    <span class="purchase-date">${new Date(sale.date).toLocaleDateString()}</span>
                                    <span class="purchase-items">${sale.items.length} items</span>
                                </div>
                                <span class="purchase-total">₦${formatNumber(sale.total)}</span>
                            </div>
                        `).join('')
                    }
                </div>
            `;

            document.getElementById('customerDetailModal').classList.add('active');
        }

        function closeCustomerDetailModal() {
            document.getElementById('customerDetailModal').classList.remove('active');
        }

        function recordPayment(customerId) {
            const amount = prompt('Enter payment amount (₦):');
            if (amount && !isNaN(amount)) {
                const customer = customers.find(c => c.id === customerId);
                if (customer) {
                    customer.debt = Math.max(0, (customer.debt || 0) - parseFloat(amount));
                    localStorage.setItem('customers', JSON.stringify(customers));
                    renderCustomers();
                    updateStats();
                    viewCustomerDetail(customerId);
                    showNotification('Payment recorded!', 'success');
                }
            }
        }

        function editCustomer(id) {
            showNotification('Edit feature coming soon!', 'info');
        }

        function formatNumber(num) {
            return parseFloat(num).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
